let currentSubject = '';
let currentIndex = 0;
let userAnswers = [];

function showSettings() {
  document.getElementById('home-screen').classList.add('hidden');
  document.getElementById('settings-screen').classList.remove('hidden');
}

function setQuestionCount(count) {
  customQuestionCount = count;
  document.getElementById('custom-question-count').value = '';
  document.getElementById('selected-count').textContent = `Selected: ${count} questions`;
  updateTotalTime();
}

function updateTotalTime() {
  const totalSeconds = customQuestionCount * timePerQuestion;
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  document.getElementById('total-time-display').textContent = `${minutes}m ${seconds}s`;
}

function increaseTime() {
  if (timePerQuestion < 600) {
    timePerQuestion += 5;
    document.getElementById('time-display').textContent = timePerQuestion;
    updateTotalTime();
  }
}

function decreaseTime() {
  if (timePerQuestion > 5) {
    timePerQuestion -= 5;
    document.getElementById('time-display').textContent = timePerQuestion;
    updateTotalTime();
  }
}

function startCustomQuiz() {
  const customInput = document.getElementById('custom-question-count').value;
  if (customInput && customInput > 0 && customInput <= 100) {
    customQuestionCount = parseInt(customInput);
  }
  
  const subject = document.getElementById('settings-subject').value;
  startQuiz(subject);
  document.getElementById('settings-screen').classList.add('hidden');
}

function startQuiz(subject) {
  currentSubject = subject;
  currentIndex = 0;
  userAnswers = new Array(customQuestionCount).fill(-1);
  currentTimer = timePerQuestion;
  
  document.getElementById('home-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.remove('hidden');
  
  renderQuestion();
  startTimer();
  lucide.createIcons();
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  currentTimer = timePerQuestion;
  updateTimerDisplay();
  
  timerInterval = setInterval(() => {
    currentTimer--;
    updateTimerDisplay();
    
    if (currentTimer <= 0) {
      nextQuestion();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const timerText = document.getElementById('timer-text');
  timerText.textContent = `${currentTimer}s`;
  
  const timerDisplay = document.getElementById('timer-display');
  if (currentTimer <= 10) {
    timerDisplay.style.backgroundColor = '#f44336';
    timerDisplay.style.boxShadow = '4px 4px 0 #c62828';
  } else if (currentTimer <= 20) {
    timerDisplay.style.backgroundColor = '#ff9800';
  } else {
    timerDisplay.style.backgroundColor = '#ff9800';
  }
}

function renderQuestion() {
  // Get up to customQuestionCount questions
  const availableQuestions = questions[currentSubject].slice(0, customQuestionCount);
  const q = availableQuestions[currentIndex];
  
  document.getElementById('question-text').textContent = `Q${currentIndex + 1}. ${q.q}`;
  document.getElementById('question-counter').textContent = `${currentIndex + 1}/${customQuestionCount}`;
  document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / customQuestionCount) * 100}%`;
  document.getElementById('prev-btn').disabled = currentIndex === 0;
  document.getElementById('next-btn').textContent = currentIndex === customQuestionCount - 1 ? 'Finish ✓' : 'Next →';

  const container = document.getElementById('options-container');
  container.innerHTML = '';
  const labels = ['A', 'B', 'C', 'D'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn w-full text-left p-4 font-medium text-gray-800 bg-white flex items-center gap-3';
    if (userAnswers[currentIndex] === i) btn.classList.add('selected');
    btn.innerHTML = `<span class="w-8 h-8 rounded-full bg-orange-100 flex items-center justify-center font-bold text-orange-700 shrink-0">${labels[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectOption(i);
    container.appendChild(btn);
  });
}

function selectOption(i) {
  userAnswers[currentIndex] = i;
  renderQuestion();
}

function nextQuestion() {
  if (currentIndex < customQuestionCount - 1) {
    currentIndex++;
    renderQuestion();
    startTimer();
  }
  else showResult();
}

function prevQuestion() {
  if (currentIndex > 0) {
    currentIndex--;
    renderQuestion();
    startTimer();
  }
}

function showResult() {
  clearInterval(timerInterval);
  
  let score = 0;
  const availableQuestions = questions[currentSubject].slice(0, customQuestionCount);
  availableQuestions.forEach((q, i) => {
    if (userAnswers[i] === q.answer) score++;
  });

  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.remove('hidden');
  document.getElementById('result-score').textContent = `${score}/${customQuestionCount}`;
  document.getElementById('result-subject').textContent = currentSubject.charAt(0).toUpperCase() + currentSubject.slice(1);

  const percentage = (score / customQuestionCount) * 100;
  let emoji = '🎉', msg = 'Excellent! You nailed it!', gradeTag = 'GENIUS';
  
  // Score grading system
  if (percentage < 40) { 
    emoji = '❌'; 
    msg = 'Keep practicing, you\'ll get there!'; 
    gradeTag = 'FAIL';
  }
  else if (percentage < 70) { 
    emoji = '👍'; 
    msg = 'Good effort! Keep it up!'; 
    gradeTag = 'AVERAGE';
  }
  else if (percentage < 90) { 
    emoji = '🔥'; 
    msg = 'Almost perfect! Great job!'; 
    gradeTag = 'PASS';
  }
  else { 
    emoji = '🏆'; 
    msg = 'Outstanding performance!'; 
    gradeTag = 'GENIUS';
  }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-message').textContent = msg;
  
  // Add grade badge
  const gradeElement = document.getElementById('result-grade');
  gradeElement.textContent = gradeTag;
  gradeElement.className = 'inline-block font-bold px-4 py-2 rounded-lg mb-3';
  
  if (gradeTag === 'FAIL') {
    gradeElement.className += ' bg-red-500 text-white text-lg';
  } else if (gradeTag === 'AVERAGE') {
    gradeElement.className += ' bg-yellow-500 text-gray-900 text-lg';
  } else if (gradeTag === 'PASS') {
    gradeElement.className += ' bg-green-500 text-white text-lg';
  } else if (gradeTag === 'GENIUS') {
    gradeElement.className += ' bg-purple-600 text-white text-lg';
  }
}

function retryQuiz() {
  startQuiz(currentSubject);
}

function goHome() {
  clearInterval(timerInterval);
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('settings-screen').classList.add('hidden');
  document.getElementById('home-screen').classList.remove('hidden');
}
